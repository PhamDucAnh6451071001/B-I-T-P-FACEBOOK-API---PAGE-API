global:
  slack_api_url: "__SLACK_WEBHOOK_URL__"

route:
  receiver: "slack-notifications"
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "slack-notifications"
      group_wait: 0s

receivers:
  - name: "slack-notifications"
    slack_configs:
      - channel: "#fb-api-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
