groups:
  - name: kafka_alerts
    rules:
      - alert: DeadLetterQueueReceived
        expr: increase(kafka_topic_partition_current_offset{topic="dead_letter"}[1m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Co message moi vao Dead Letter Queue"
          description: "Topic dead_letter vua nhan them message. Kiem tra Kafka UI tai http://localhost:8080."

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Consumer lag cao bat thuong"
          description: "Consumer group {{ $labels.consumergroup }} dang lag {{ $value }} tren topic {{ $labels.topic }}."

      - alert: WebhookReceiverSilent
        expr: increase(kafka_topic_partition_current_offset{topic="raw_events"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Khong co event nao tu Facebook trong 10 phut"
          description: "Topic raw_events khong co message moi. Kiem tra lai webhook subscription."
